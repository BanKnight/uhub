name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  integration-anthropic:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Anthropic smoke phases
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          cleanup() {
            if [ -f artifacts/worker.pid ]; then
              kill "$(cat artifacts/worker.pid)" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          export UHUB_ADMIN_EMAIL="ci-admin@example.com"
          export UHUB_ADMIN_PASSWORD="ci-admin-password-123"

          bun install --frozen-lockfile 2>&1 | tee artifacts/install.log
          bun run db:migrate:local 2>&1 | tee artifacts/db-migrate.log

          bun run --cwd apps/api-worker dev -- --config wrangler.jsonc --port 8797 --var ADMIN_EMAIL:$UHUB_ADMIN_EMAIL --var ADMIN_PASSWORD:$UHUB_ADMIN_PASSWORD > artifacts/worker.log 2>&1 &
          echo $! > artifacts/worker.pid

          export UHUB_WORKER_BASE_URL="http://127.0.0.1:8797"
          timeout 30 bash -lc 'until curl -fsS "$UHUB_WORKER_BASE_URL/healthz"; do sleep 1; done'

          bun run test:integration:anthropic:nonstream 2>&1 | tee artifacts/anthropic-nonstream.log
          bun run test:integration:anthropic:stream-text 2>&1 | tee artifacts/anthropic-stream-text.log
          bun run test:integration:anthropic:tool-use-stream 2>&1 | tee artifacts/anthropic-tool-use-stream.log
          bun run test:integration:anthropic:tool-use-nonstream 2>&1 | tee artifacts/anthropic-tool-use-nonstream.log
          bun run test:integration:anthropic:invalid-request 2>&1 | tee artifacts/anthropic-invalid-request.log
          bun run test:integration:anthropic:gateway-failover 2>&1 | tee artifacts/anthropic-gateway-failover.log

      - name: Upload Anthropic smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-smoke-artifacts
          path: artifacts/
