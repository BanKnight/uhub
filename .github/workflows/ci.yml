name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  integration-openai:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run OpenAI integration suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          bun install --frozen-lockfile 2>&1 | tee artifacts/install.log
          UHUB_ARTIFACTS_DIR=artifacts bun run test:integration:openai:local 2>&1 | tee artifacts/openai.log

      - name: Upload OpenAI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-integration-artifacts
          path: artifacts/

